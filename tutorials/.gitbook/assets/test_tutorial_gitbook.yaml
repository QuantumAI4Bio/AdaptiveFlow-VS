---

blueprint_name: demo

vars:
  project_id: your_project_name
  deployment_name: demo
  region: us-west1
  zone: us-west1-a
  instance_image:
    # Please refer to the following link for the latest images:
    # https://github.com/SchedMD/slurm-gcp/blob/master/docs/images.md#supported-operating-systems
    family: schedmd-v5-slurm-22-05-8-ubuntu-2204-lts
    project: projects/schedmd-slurm-public/global/images/family

deployment_groups:
- group: primary
  modules:
  # Source is an embedded resource, denoted by "resources/*" without ./, ../, /
  # as a prefix. To refer to a local resource, prefix with ./, ../ or /
  # Example - ./resources/network/vpc
  - id: network1
    source: modules/network/vpc

  - id: homefs
    source: community/modules/file-system/nfs-server
    use: [network1]
    settings:
      auto_delete_disk: true
      disk_size: 100
      type: pd-ssd
      zone: us-west1-a
      local_mounts: [ /home ]

  - id: datafs
    source: modules/file-system/filestore
    use: [network1]
    settings:
      local_mount: /home
      filestore_tier: BASIC_HDD
      size_gb: 1024


  - id: debug_node_group
    source: community/modules/compute/schedmd-slurm-gcp-v5-node-group
    settings:
      node_count_dynamic_max: 10
      machine_type: n2d-highcpu-64
      preemptible: true
      disable_public_ips: true
      enable_smt: true
  - id: debug_partition
    source: community/modules/compute/schedmd-slurm-gcp-v5-partition
    use:
    - network1
    - homefs
    - datafs
    - debug_node_group
    - startup-script
    settings:
      partition_name: debug
      enable_placement: false
      is_default: true

      
  - id: slurm_controller
    source: community/modules/scheduler/schedmd-slurm-gcp-v5-controller
    use:
    - network1
#   - primary_partition
#    - compute_partition
    - debug_partition
    - homefs
    - datafs
    - startup-script
    settings:
      machine_type: n1-standard-16
      disable_controller_public_ips: true

  - id: slurm_login
    source: community/modules/scheduler/schedmd-slurm-gcp-v5-login
    use:
    - network1
    - slurm_controller
    - startup-script
    settings:
      machine_type: n1-standard-16
      disable_login_public_ips: true

  - id: startup-script
    source: modules/scripts/startup-script
    settings:
      runners:
      - type: shell
        destination: "/tmp/mysetup.sh"
        content: |
          #!/bin/bash
          sudo apt-get update > /tmp/update.log
          sudo apt-get -y install openbabel > /tmp/ob.log
          sudo echo "bc&babel install done" > /tmp/custom-setup-done
          obabel > /var/log/slurm/startup.log
          obenergy > /var/log/slurm/startup.log

